services:
  postgres:
    image: postgres:16-alpine
    container_name: pqr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pqr
      POSTGRES_PASSWORD: pqr
      POSTGRES_DB: pqr
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - pqr-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pqr -d pqr"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: pqr-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://pqr:pqr@postgres:5432/pqr
      PGSSL: "false"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"
    volumes:
      - wa-auth-data:/app/wa-auth
    networks:
      - pqr-net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: pqr-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - pqr-net

volumes:
  pg-data:
  wa-auth-data:

networks:
  pqr-net:
    driver: bridge
